<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Sign Up - Thrift & Trend Online</title>
  <link rel="stylesheet" href="stylesheet.css">
</head>
<body>

  <!-- Header -->
  <header>
    <h1>Thrift & Trend</h1>
    <nav>
      <a href="Homepage.html">Home</a>
      <a href="Shoppage.html">Shop</a>
      <a href="#">Sell With Us</a>
      <a href="Blogpage.html">Blog</a>
      <a href="Aboutpage.html">About Us</a>
      <a href="Contactpage.html">Contact Us</a>
      <a href="Loginpage.html" class="active">My Account</a>
    </nav>
  </header>

  <!-- Authentication Container -->
  <main class="auth-container">
    <h2 id="formTitle">Login</h2>

    <!-- Login Form -->
    <form id="loginForm">
      <label for="loginEmail">Email</label>
      <input type="email" id="loginEmail" placeholder="Enter your email" required>

      <label for="loginPassword">Password</label>
      <input type="password" id="loginPassword" placeholder="Enter your password" required>

      <button type="submit" onclick="event.preventDefault(); window.location.href='account.html';">Login</button>
    </form>

    <!-- Sign Up Form -->
    <form id="signupForm" style="display: none;">
      <label for="signupName">Full Name</label>
      <input type="text" id="signupName" placeholder="Enter your name" required>

      <label for="signupEmail">Email</label>
      <input type="email" id="signupEmail" placeholder="Enter your email" required>

      <label for="signupPhone">Phone</label>
      <input type="text" id="signupPhone" placeholder="Enter your phone" required>

      <label for="signupPassword">Password</label>
      <input type="password" id="signupPassword" placeholder="Create a password" required>

      <button type="submit" onclick="event.preventDefault(); window.location.href='account.html';">Sign Up</button>
    </form>

    <!-- Toggle -->
    <div class="toggle">
      <p id="toggleText">Don’t have an account? 
        <a href="#" onclick="toggleForm()">Sign Up</a>
      </p>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 Thrift & Trend Online</p>
    <p>
      <a href="about.html">About</a> | 
      <a href="#">FAQs</a> | 
      <a href="#">Privacy Policy</a> | 
      <a href="#">Return Policy</a>
    </p>
  </footer>

  <script>
    function toggleForm() {
      const loginForm = document.getElementById("loginForm");
      const signupForm = document.getElementById("signupForm");
      const formTitle = document.getElementById("formTitle");
      const toggleText = document.getElementById("toggleText");

      if (loginForm.style.display === "none") {
        loginForm.style.display = "block";
        signupForm.style.display = "none";
        formTitle.textContent = "Login";
        toggleText.innerHTML = "Don’t have an account? <a href='#' onclick='toggleForm()'>Sign Up</a>";
      } else {
        loginForm.style.display = "none";
        signupForm.style.display = "block";
        formTitle.textContent = "Sign Up";
        toggleText.innerHTML = "Already have an account? <a href='#' onclick='toggleForm()'>Login</a>";
      }
    }
  </script>

</body>
</html>
